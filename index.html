<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — App Portfolio</title>
<meta name="description" content="NEXUS — A unified dashboard for hosting, monitoring, and demoing a personal PWA portfolio.">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXUS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080808;
  --surface: #0e0e0e;
  --surface2: #141414;
  --surface3: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.18);
  --gold: #c9a84c;
  --gold-dim: #8a6f30;
  --gold-glow: rgba(201,168,76,0.15);
  --white: #f5f0e8;
  --dim: #6b6560;
  --dim2: #3a3632;
  --green: #3dba7a;
  --red: #c0392b;
  --amber: #c9813a;
  --sidebar-w: 300px;
  --header-h: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  overflow: hidden;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim2); border-radius: 2px; }

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
  opacity: 0.4;
}

/* ── LAYOUT ── */
.shell { display: flex; height: 100vh; }

/* ── SIDEBAR ── */
aside {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 50;
}

/* Wordmark */
.wordmark {
  padding: 32px 28px 24px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}
.wordmark-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.wordmark-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--white);
}
.wordmark-title em {
  font-style: italic;
  color: var(--gold);
}
.wordmark-sub {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-top: 6px;
  text-transform: uppercase;
}

/* Search */
.sidebar-search {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-icon {
  position: absolute; left: 12px;
  color: var(--dim); font-size: 12px;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px 9px 32px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--dim); }
.search-input:focus { border-color: var(--gold-dim); }
.refresh-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--dim);
  width: 34px; height: 34px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* Nav list */
.nav-section-label {
  padding: 16px 20px 8px;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
}
.app-list {
  flex-grow: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.04));
  border-color: rgba(201,168,76,0.2);
}
.nav-item.active .nav-item-name { color: var(--gold); }

.status-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pip-live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: breathe 2.5s ease-in-out infinite; }
.pip-offline { background: var(--red); }
.pip-checking { background: var(--amber); animation: blink 1s step-end infinite; }

@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.nav-item-info { flex-grow: 1; min-width: 0; }
.nav-item-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-item-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-top: 1px;
}
.nav-item-status {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
}
.s-live { color: var(--green); }
.s-offline { color: var(--red); }
.s-checking { color: var(--amber); }

/* Sidebar footer */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.settings-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── MAIN ── */
main {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Dashboard header */
.dash-header {
  padding: 0 48px;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dash-header-left {
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.dash-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
}
.dash-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
}
.dash-header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.header-stat {
  text-align: right;
}
.header-stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--white);
}
.header-stat-val span { color: var(--green); }
.header-stat-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
}
.header-divider { width: 1px; height: 28px; background: var(--border); }

/* Dashboard scroll */
.dash-body {
  flex-grow: 1;
  overflow-y: auto;
  padding: 48px;
}

/* Section heading */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
}
.section-rule {
  flex-grow: 1;
  height: 1px;
  background: var(--border);
}
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
  flex-shrink: 0;
}
.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim2);
  flex-shrink: 0;
}

/* ── APP CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 60px;
}

.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  display: flex;
  flex-direction: column;
  animation: cardIn 0.5s cubic-bezier(0.23,1,0.32,1) both;
}
.app-card:nth-child(1) { animation-delay: 0.05s; }
.app-card:nth-child(2) { animation-delay: 0.1s; }
.app-card:nth-child(3) { animation-delay: 0.15s; }
.app-card:nth-child(4) { animation-delay: 0.2s; }
.app-card:nth-child(5) { animation-delay: 0.25s; }
.app-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.app-card:hover {
  border-color: rgba(201,168,76,0.3);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
}

/* Card preview area */
.card-preview {
  height: 160px;
  position: relative;
  overflow: hidden;
  background: var(--surface2);
  flex-shrink: 0;
}
.card-preview-iframe {
  width: 200%;
  height: 200%;
  border: none;
  transform: scale(0.5);
  transform-origin: top left;
  pointer-events: none;
}
.card-preview-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 60%, var(--surface) 100%);
}
.card-preview-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
}
.card-preview-initial {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-weight: 900;
  font-style: italic;
  color: var(--dim2);
  line-height: 1;
}
.card-preview-url {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim2);
  letter-spacing: 1px;
}

/* Card pip badge */
.card-status-badge {
  position: absolute;
  top: 12px; right: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(8,8,8,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
}

/* Card body */
.card-body {
  padding: 18px 20px 20px;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
}
.card-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
  line-height: 1.2;
}
.card-desc {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.6;
  flex-grow: 1;
  margin-bottom: 16px;
}
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-url-display {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 70%;
}
.card-launch-btn {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  background: none;
  border: 1px solid rgba(201,168,76,0.3);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.card-launch-btn:hover {
  background: var(--gold-glow);
  border-color: var(--gold);
}

/* ── IFRAME VIEW ── */
.iframe-wrapper {
  flex-grow: 1;
  display: none;
  flex-direction: column;
  position: relative;
}
.iframe-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  gap: 20px;
  flex-shrink: 0;
}
.iframe-back {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 7px 14px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.iframe-back:hover { border-color: var(--gold-dim); color: var(--gold); }
.iframe-title-block { flex-grow: 1; }
.iframe-app-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
}
.iframe-app-url {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1px;
}
.iframe-key-area {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
}
.iframe-key-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
}
.iframe-key-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--gold);
}
.iframe-copy-btn {
  background: none;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.iframe-copy-btn:hover { background: var(--gold-glow); }

#app-frame {
  flex-grow: 1;
  border: none;
  background: #fff;
}

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-backdrop.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-panel {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  width: 600px;
  max-width: 95vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: panelIn 0.3s cubic-bezier(0.23,1,0.32,1) both;
}
@keyframes panelIn { from { opacity:0; transform: scale(0.97) translateY(10px); } to { opacity:1; transform: none; } }

.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.modal-header-text {}
.modal-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
}
.modal-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  width: 32px; height: 32px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }

/* Tabs */
.modal-tabs {
  display: flex;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  gap: 24px;
  flex-shrink: 0;
}
.modal-tab {
  background: none; border: none;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dim);
  padding: 14px 0;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.modal-tab:hover { color: var(--white); }
.modal-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.modal-body {
  flex-grow: 1;
  overflow-y: auto;
  padding: 24px 28px;
}

/* Config rows */
.config-row {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.config-row:last-child { border-bottom: none; }
.config-row-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.config-row-num {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--dim2);
  letter-spacing: 2px;
}
.delete-btn {
  background: none;
  border: none;
  color: var(--dim2);
  cursor: pointer;
  font-size: 14px;
  transition: color 0.2s;
  padding: 2px;
}
.delete-btn:hover { color: var(--red); }
.config-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.config-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 9px 12px;
  border-radius: 5px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.config-input:focus { border-color: var(--gold-dim); }
.config-input::placeholder { color: var(--dim2); }
.config-input.full { grid-column: 1 / -1; }
.config-input-desc {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 11px;
  padding: 9px 12px;
  border-radius: 5px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  grid-column: 1 / -1;
  resize: vertical;
  min-height: 50px;
}
.config-input-desc:focus { border-color: var(--gold-dim); }

.add-app-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--dim2);
  color: var(--dim);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  text-transform: uppercase;
}
.add-app-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* IO tab */
.io-grid { display: grid; gap: 12px; }
.io-btn {
  width: 100%;
  padding: 14px;
  border-radius: 7px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.io-btn-primary {
  background: var(--gold);
  border: none;
  color: #000;
}
.io-btn-primary:hover { background: #d4ad52; }
.io-btn-ghost {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
}
.io-btn-ghost:hover { border-color: var(--gold-dim); color: var(--gold); }

/* Branding tab */
.branding-zone {
  text-align: center;
  padding: 20px 0;
}
.branding-zone p {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}
.file-label {
  display: inline-block;
  background: var(--surface2);
  border: 1px dashed var(--border-bright);
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 1px;
  padding: 12px 24px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;

</style>
</head>
<body>

<div class="shell">

          <div class="header-stat">
            <div class="header-stat-val" id="check-time" style="font-size:11px; color:var(--dim);">—</div>
            <div class="header-stat-label">Last Check</div>

      <div class="dash-body">
        <div class="section-header">

<!-- ── MODAL ── -->

      <div class="modal-header-text">
        <div class="modal-eyebrow">Configuration</div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab(event,'tab-apps')">Apps & Keys</button>
      <button class="modal-tab" onclick="switchTab(event,'tab-brand')">Branding</button>

    <div class="modal-body">

      <div id="tab-brand" style="display:none;">

          <button class="io-btn io-btn-ghost" style="width:auto; padding:10px 24px;" onclick="resetLogo()">Reset to Text</button>
        </div>

        <div class="io-grid">
          <button class="io-btn io-btn-primary" onclick="exportJSON()">↓ &nbsp;Export JSON Config</button>
          <label class="io-btn io-btn-ghost" style="text-align:center; display:block; line-height:1;">

          </label>

      </div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let apps = JSON.parse(localStorage.getItem('nexus-apps') || 'null') || [
  { id: 'unplugged', name: 'UNPLUGGED', tag: 'Music PWA', desc: '', url: 'https://johnlaz.github.io/unplugged/', key: '', meta: null },
  { id: 'armor',    name: 'ARMOR',     tag: 'Security',   desc: '', url: 'https://example.com/armor',             key: 'KEY-001', meta: null },
  { id: 'asap',     name: 'ASAP',      tag: 'Operations', desc: '', url: 'https://example.com/asap',              key: 'KEY-002', meta: null },
];

let activeApp = null;

// ── HELPERS ──
function save() { localStorage.setItem('nexus-apps', JSON.stringify(apps)); }

function toast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function uid() { return Math.random().toString(36).slice(2, 9); }

// ── RENDER ──
function render() {
  renderSidebar();
  renderGrid();
  updateStats();
  save();
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  apps.forEach(app => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (activeApp?.id === app.id ? ' active' : '');
    el.id = `nav-${app.id}`;
    el.innerHTML = `
      <span class="status-pip pip-checking" id="pip-${app.id}"></span>
      <div class="nav-item-info">
        <div class="nav-item-name">${app.name}</div>
        <div class="nav-item-tag">${app.tag || ''}</div>
      </div>
      <span class="nav-item-status s-checking" id="navstat-${app.id}">…</span>
    `;
    el.onclick = () => launch(app);
    list.appendChild(el);
  });
}

function renderGrid() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  document.getElementById('app-count-label').textContent = `${apps.length} ${apps.length === 1 ? 'entry' : 'entries'}`;

  apps.forEach(app => {
    const shortUrl = app.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    const initial = (app.meta?.title || app.name || '?').charAt(0).toUpperCase();
    const displayName = app.meta?.title || app.name;
    const displayDesc = app.meta?.desc || app.desc || 'No description available.';
    const displayTag = app.tag || app.meta?.tag || 'Application';
    const favicon = app.meta?.favicon || '';
    const ogImage = app.meta?.ogImage || '';
    const themeColor = app.meta?.themeColor || '';

    const card = document.createElement('div');
    card.className = 'app-card';
    card.id = `card-${app.id}`;

    // Preview area: og:image if available, else stylized placeholder
    const previewInner = ogImage
      ? `<img src="${ogImage}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-preview-placeholder" style="display:none;">
           <div class="card-preview-initial" style="${themeColor ? `color:${themeColor}` : ''}">${initial}</div>
           <div class="card-preview-url">${shortUrl}</div>
         </div>`
      : `<div class="card-preview-placeholder">
           <div class="card-preview-initial" style="${themeColor ? `color:${themeColor}` : ''}">${initial}</div>
           <div class="card-preview-url">${shortUrl}</div>
         </div>`;

    // Favicon badge
    const faviconHtml = favicon
      ? `<img src="${favicon}" width="14" height="14" style="border-radius:3px;object-fit:contain;" onerror="this.style.display='none'">`
      : '';

    // Scrape state indicator
    const scrapeIndicator = app.meta
      ? '' 
      : `<span id="scraping-${app.id}" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:1px;">Scanning…</span>`;

    card.innerHTML = `
      <div class="card-preview" style="${themeColor ? `border-top:2px solid ${themeColor}` : ''}">
        ${previewInner}
        <div class="card-preview-overlay"></div>
        <div class="card-status-badge">
          <span class="status-pip pip-checking" id="cardpip-${app.id}"></span>
          <span class="s-checking" id="cardstat-${app.id}" style="font-size:9px;letter-spacing:2px;">CHECKING</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-tag" style="display:flex;align-items:center;gap:6px;">
          ${faviconHtml}
          <span>${displayTag}</span>
          ${scrapeIndicator}
        </div>
        <div class="card-name">${displayName}</div>
        <div class="card-desc">${displayDesc}</div>
        <div class="card-footer">
          <span class="card-url-display">${shortUrl}</span>
          <button class="card-launch-btn" onclick="event.stopPropagation(); launch(apps.find(a=>a.id==='${app.id}'))">Launch →</button>
        </div>
      </div>
    `;
    card.onclick = () => launch(app);
    grid.appendChild(card);

    checkStatus(app);

    // Auto-scrape if no metadata yet
    if (!app.meta && app.url && app.url.startsWith('http')) {
      scrapeMetadata(app);
    }
  });
}

// ── METADATA SCRAPER ──
async function scrapeMetadata(app) {
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(app.url)}`;
  try {
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    const data = await res.json();
    const html = data.contents;
    if (!html) return;

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Extract metadata
    const get = (sel) => doc.querySelector(sel)?.content?.trim() || '';
    const getAttr = (sel, attr) => doc.querySelector(sel)?.getAttribute(attr)?.trim() || '';

    const ogTitle   = get('meta[property="og:title"]');
    const metaTitle = doc.querySelector('title')?.textContent?.trim() || '';
    const ogDesc    = get('meta[property="og:description"]') || get('meta[name="description"]');
    const ogImage   = get('meta[property="og:image"]');
    const themeColor = get('meta[name="theme-color"]');

    // Resolve favicon
    let favicon = getAttr('link[rel="icon"]', 'href')
      || getAttr('link[rel="shortcut icon"]', 'href')
      || getAttr('link[rel="apple-touch-icon"]', 'href')
      || '/favicon.ico';

    // Make favicon absolute
    if (favicon && !favicon.startsWith('http')) {
      const base = new URL(app.url);
      favicon = favicon.startsWith('/')
        ? `${base.origin}${favicon}`
        : `${base.origin}/${favicon}`;
    }

    // Make og:image absolute
    let resolvedOgImage = ogImage;
    if (ogImage && !ogImage.startsWith('http')) {
      const base = new URL(app.url);
      resolvedOgImage = ogImage.startsWith('/')
        ? `${base.origin}${ogImage}`
        : `${base.origin}/${ogImage}`;
    }

    // Derive a clean app name from title (strip common suffixes)
    const rawTitle = ogTitle || metaTitle;
    const cleanTitle = rawTitle
      .replace(/\s*[|\-–—]\s*.*/,'')  // strip "— Site Name" suffixes
      .replace(/\s*:.*$/,'')           // strip ": subtitle"
      .trim() || app.name;

    // Build tag from meta keywords or existing
    const keywords = get('meta[name="keywords"]');
    const autoTag = keywords
      ? keywords.split(',')[0].trim()
      : (app.tag || 'Application');

    app.meta = {
      title: cleanTitle,
      desc: ogDesc || '',
      ogImage: resolvedOgImage || '',
      favicon: favicon || '',
      themeColor: themeColor || '',
      tag: autoTag,
      scrapedAt: Date.now()
    };

    // If name/desc were still defaults, update them
    if (!app.userSetName) app.name = cleanTitle;
    if (!app.userSetDesc) app.desc = ogDesc || '';
    if (!app.userSetTag)  app.tag  = autoTag;

    save();

    // Re-render just this card
    const cardEl = document.getElementById(`card-${app.id}`);
    if (cardEl) {
      // Remove scraping indicator
      const si = document.getElementById(`scraping-${app.id}`);
      if (si) si.remove();

      // Update card contents
      const shortUrl = app.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
      const previewDiv = cardEl.querySelector('.card-preview');
      const placeholder = previewDiv.querySelector('.card-preview-placeholder');

      if (resolvedOgImage) {
        const img = document.createElement('img');
        img.src = resolvedOgImage;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        img.onerror = () => img.remove();
        previewDiv.insertBefore(img, placeholder);
      }

      if (themeColor) {
        previewDiv.style.borderTop = `2px solid ${themeColor}`;
        const init = placeholder?.querySelector('.card-preview-initial');
        if (init) init.style.color = themeColor;
      }

      cardEl.querySelector('.card-name').textContent = cleanTitle;
      if (ogDesc) cardEl.querySelector('.card-desc').textContent = ogDesc;

      const tagEl = cardEl.querySelector('.card-tag span');
      if (tagEl) tagEl.textContent = autoTag;

      // Insert favicon
      if (favicon) {
        const tagContainer = cardEl.querySelector('.card-tag');
        const img = document.createElement('img');
        img.src = favicon;
        img.width = 14; img.height = 14;
        img.style.cssText = 'border-radius:3px;object-fit:contain;';
        img.onerror = () => img.remove();
        tagContainer.insertBefore(img, tagContainer.firstChild);
      }

      // Also update sidebar nav item
      const navName = document.querySelector(`#nav-${app.id} .nav-item-name`);
      if (navName) navName.textContent = cleanTitle;
      const navTag = document.querySelector(`#nav-${app.id} .nav-item-tag`);
      if (navTag) navTag.textContent = autoTag;
    }
  } catch (err) {
    console.warn(`[Nexus] Metadata scrape failed for ${app.url}:`, err);
    const si = document.getElementById(`scraping-${app.id}`);
    if (si) { si.textContent = 'Scan failed'; si.style.color = 'var(--dim2)'; }
  }
}

function updateStats() {
  document.getElementById('total-count').textContent = apps.length;
}

// ── STATUS ──
async function checkStatus(app) {
  try {
    await fetch(app.url, { mode: 'no-cors', signal: AbortSignal.timeout(5000) });
    setStatus(app.id, 'live');
  } catch {
    setStatus(app.id, 'offline');
  }
  updateLiveCount();
  updateCheckTime();
}

function setStatus(id, state) {
  const classes = { live: ['pip-live', 's-live', 'LIVE'], offline: ['pip-offline', 's-offline', 'OFFLINE'] };
  const [pipClass, txtClass, label] = classes[state] || ['pip-checking', 's-checking', '…'];

  ['pip-','cardpip-'].forEach(prefix => {
    const el = document.getElementById(prefix + id);
    if (el) { el.className = 'status-pip ' + pipClass; }
  });
  ['navstat-','cardstat-'].forEach(prefix => {
    const el = document.getElementById(prefix + id);
    if (el) { el.className = txtClass; el.textContent = label; el.style.fontSize = '9px'; el.style.letterSpacing = '2px'; }
  });
}

function updateLiveCount() {
  const liveEls = document.querySelectorAll('.status-pip.pip-live');
  const unique = new Set([...liveEls].map(el => el.id.replace('pip-','').replace('cardpip-','')));
  document.getElementById('live-count').textContent = Math.ceil(unique.size / 2);
}

function updateCheckTime() {
  const now = new Date();
  document.getElementById('check-time').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function refreshAll() {
  apps.forEach(checkStatus);
  toast('Status refresh initiated');
}

// ── LAUNCH / NAV ──
function launch(app) {
  activeApp = app;

  document.getElementById('dashboard-view').style.display = 'none';
  const iframeView = document.getElementById('iframe-view');
  iframeView.style.display = 'flex';

  document.getElementById('iframe-app-name').textContent = app.name;
  document.getElementById('iframe-app-url').textContent = app.url;
  document.getElementById('app-frame').src = app.url;

  const keyArea = document.getElementById('key-area');
  if (app.key) {
    keyArea.style.display = 'flex';
    document.getElementById('active-key').textContent = app.key;
  } else {
    keyArea.style.display = 'none';
  }

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${app.id}`);
  if (navEl) navEl.classList.add('active');
}

function showDashboard() {
  activeApp = null;
  document.getElementById('dashboard-view').style.display = 'flex';
  document.getElementById('iframe-view').style.display = 'none';
  document.getElementById('app-frame').src = '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
}

function copyKey() {
  const key = document.getElementById('active-key').textContent;
  navigator.clipboard.writeText(key).then(() => toast('Key copied to clipboard'));
}

// ── FILTER ──
function filterApps() {
  const q = document.getElementById('app-search').value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.app-card').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// ── MODAL ──
function openModal() {
  document.getElementById('config-modal').classList.add('open');
  renderConfigRows();
}
function closeModal() {
  document.getElementById('config-modal').classList.remove('open');
  render();
}
document.getElementById('config-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('config-modal')) closeModal();
});

function switchTab(e, tabId) {
  document.querySelectorAll('.modal-body > div').forEach(d => d.style.display = 'none');
  document.querySelectorAll('.modal-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).style.display = '';
  e.currentTarget.classList.add('active');
}

function renderConfigRows() {
  const container = document.getElementById('config-rows');
  container.innerHTML = '';
  apps.forEach((app, i) => {
    const favicon = app.meta?.favicon || '';
    const scrapedLabel = app.meta
      ? `<span style="color:var(--green);font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1px;">✓ Auto-filled</span>`
      : `<span style="color:var(--dim);font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1px;">Paste URL to scan</span>`;

    const row = document.createElement('div');
    row.className = 'config-row';
    row.innerHTML = `
      <div class="config-row-header">
        <div style="display:flex;align-items:center;gap:8px;">
          ${favicon ? `<img src="${favicon}" width="14" height="14" style="border-radius:3px;" onerror="this.style.display='none'">` : ''}
          <span class="config-row-num">APP ${String(i+1).padStart(2,'0')}</span>
          ${scrapedLabel}
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button onclick="rescanApp('${app.id}')" style="background:none;border:1px solid var(--dim2);color:var(--dim);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:1px;" title="Re-scan metadata">↻ Rescan</button>
          <button class="delete-btn" onclick="deleteApp('${app.id}')">🗑</button>
        </div>
      </div>
      <div class="config-inputs">
        <input class="config-input" placeholder="App Name" value="${escHtml(app.name)}" oninput="updateApp('${app.id}','name',this.value)">
        <input class="config-input" placeholder="Tag (e.g. Music PWA)" value="${escHtml(app.tag||'')}" oninput="updateApp('${app.id}','tag',this.value)">
        <input class="config-input full" placeholder="URL — paste to auto-scan metadata" value="${escHtml(app.url)}" oninput="updateApp('${app.id}','url',this.value)">
        <input class="config-input full" placeholder="API Key / License (optional)" value="${escHtml(app.key||'')}" oninput="updateApp('${app.id}','key',this.value)">
        <textarea class="config-input-desc" placeholder="Description (auto-filled from meta)" oninput="updateApp('${app.id}','desc',this.value)">${escHtml(app.desc||'')}</textarea>
      </div>
    `;
    container.appendChild(row);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function rescanApp(id) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  app.meta = null;
  app.userSetName = false;
  app.userSetDesc = false;
  app.userSetTag  = false;
  save();
  renderConfigRows();
  scrapeMetadata(app).then(() => renderConfigRows());
  toast('Rescanning metadata…');
}

// Debounce scrape triggers so rapid typing doesn't fire 10 requests
const _scrapeTimers = {};
function debounceRescrape(app) {
  clearTimeout(_scrapeTimers[app.id]);
  _scrapeTimers[app.id] = setTimeout(() => scrapeMetadata(app), 1200);
}

function updateApp(id, field, val) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  app[field] = val;
  if (field === 'name') app.userSetName = true;
  if (field === 'desc') app.userSetDesc = true;
  if (field === 'tag')  app.userSetTag  = true;
  if (field === 'url' && val.startsWith('http') && val.length > 12) {
    app.meta = null;
    debounceRescrape(app);
  }
  save();
}

function addApp() {
  const newApp = { id: uid(), name: 'New App', tag: 'Application', desc: '', url: 'https://', key: '', meta: null };
  apps.push(newApp);
  renderConfigRows();
  save();
}

function deleteApp(id) {
  if (!confirm('Remove this application?')) return;
  apps = apps.filter(a => a.id !== id);
  renderConfigRows();
  save();
}

// ── BRANDING ──
function handleLogo(e) {
  const reader = new FileReader();
  reader.onload = ev => {
    document.querySelector('.wordmark').innerHTML = `
      <img src="${ev.target.result}" style="max-width:100%; max-height:60px; object-fit:contain;">
    `;
    localStorage.setItem('nexus-logo', ev.target.result);
  };
  reader.readAsDataURL(e.target.files[0]);
}

function resetLogo() {
  localStorage.removeItem('nexus-logo');
  document.querySelector('.wordmark').innerHTML = `
    <div class="wordmark-label">App Portfolio</div>
    <div class="wordmark-title">NEX<em>US</em></div>
    <div class="wordmark-sub">johnlaz.github.io</div>
  `;
  document.querySelector('.wordmark').onclick = showDashboard;
}

function loadStoredLogo() {
  const logo = localStorage.getItem('nexus-logo');
  if (logo) {
    document.querySelector('.wordmark').innerHTML = `
      <img src="${logo}" style="max-width:100%; max-height:60px; object-fit:contain; cursor:pointer;" onclick="showDashboard()">
    `;
  } else {
    document.querySelector('.wordmark').onclick = showDashboard;
  }
}

// ── IO ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(apps, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nexus_config.json';
  a.click();
  toast('Config exported');
}

function importJSON(e) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      apps = JSON.parse(ev.target.result);
      save();
      closeModal();
      render();
      toast('Config imported successfully');
    } catch { toast('Invalid JSON file'); }
  };
  reader.readAsText(e.target.files[0]);
}

// ── INIT ──
loadStoredLogo();
render();

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[Nexus SW] Registered:', reg.scope))
      .catch(err => console.warn('[Nexus SW] Failed:', err));
  });
}
</script>
</body>
